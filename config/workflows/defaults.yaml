# Default workflow configuration
# This file defines the default approval stages, version storage settings,
# and SLA policies for the IOU-Modern workflow system.

approval_stages:
  - stage_id: "manager_review"
    stage_name: "Manager Review"
    stage_order: 1
    approval_type: sequential
    approvers:
      - role: "manager"
    sla_hours: 72
    expiry_action: "notify_only"
    is_optional: false

  - stage_id: "director_approval"
    stage_name: "Director Approval"
    stage_order: 2
    approval_type: parallel_any
    approvers:
      - role: "director"
    sla_hours: 48
    expiry_action: "escalate_to:finance_team"
    is_optional: true
    condition: "document.total_amount > 10000"

  - stage_id: "compliance_check"
    stage_name: "Compliance Check"
    stage_order: 3
    approval_type: parallel_all
    approvers:
      - role: "compliance_officer"
    sla_hours: 120
    expiry_action: "return_to_draft"
    is_optional: false

version_storage:
  full_versions_keep: 5
  compress_after_days: 30

sla:
  weekend_days:
    - Saturday
    - Sunday
  escalation_hours:
    - 24
    - 8
    - 1
