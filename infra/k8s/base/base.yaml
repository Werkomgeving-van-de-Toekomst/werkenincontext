# Haven+ Base Kubernetes Manifests
apiVersion: v1
kind: Namespace
metadata:
  name: iou-base
  labels:
    haven.common-ground.nl/managed: "true"
    haven.common-ground.nl/version: "1.0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iou-api-config
  namespace: iou-base
data:
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  RUST_LOG: "info"
  DATABASE_MAX_POOL_SIZE: "10"
  CACHE_TTL: "3600"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iou-api
  namespace: iou-base
  labels:
    haven.common-ground.nl/service-account: "true"
  annotations:
    haven.common-ground.nl/organization: "organization"
automountServiceAccountToken: false
---
# Pod Security Policy (if enforced)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: iou-api-restricted
  namespace: iou-base
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfiles: runtime/default
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
  - configMap
  - secret
  - downwardAPI
  - projected
  - emptyDir
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser: 1001
  runAsGroup: 1001
  seLinux:
    rule: RunAsAny
  fsGroup:
    rule: RunAsAny
  readOnlyRootFilesystem: false
---
# Network Policy (Haven+ requirement)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iou-api-network-policy
  namespace: iou-base
spec:
  podSelector:
    matchLabels:
      app: iou-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          haven.common-ground.nl/type: "ingress"
    - podSelector:
        matchLabels:
          app: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          app: postgresql
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector:
        matchLabels:
          app: minio
    ports:
    - protocol: TCP
      port: 9000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # NLX Outway
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53  # DNS
---
# Resource Quota (Haven+ requirement)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: iou-api-quota
  namespace: iou-base
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    persistentvolumeclaims: "2"
---
# Limit Range (Haven+ requirement)
apiVersion: v1
kind: LimitRange
metadata:
  name: iou-api-limits
  namespace: iou-base
spec:
  limits:
    - default:
        cpu: "1000m"
        memory: "1Gi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      type: Container
