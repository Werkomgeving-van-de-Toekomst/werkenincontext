# Haven+ Kustomize Overlay - Staging
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iou-staging

resources:
  - ../../base

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: iou-api
    spec:
      replicas: 3

configMapGenerator:
  - name: iou-api-config
    literals:
      - ENVIRONMENT=staging
      - DATABASE_MAX_POOL_SIZE=10
      - ENABLE_DEBUG=false

labels:
  - pairs:
      haven.common-ground.nl/environment: staging
      haven.common-ground.nl/version: "1.0"
