# Haven+ Kustomize Overlay - Development
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iou-dev

resources:
  - ../../base

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: iou-api
    spec:
      replicas: 2
      template:
        spec:
          containers:
            - name: iou-api
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 50m
                  memory: 128Mi
              env:
                - name: LOG_LEVEL
                  value: "debug"
                - name: RUST_BACKTRACE
                  value: "1"

configMapGenerator:
  - name: iou-api-config
    literals:
      - ENVIRONMENT=development
      - DATABASE_MAX_POOL_SIZE=5
      - ENABLE_DEBUG=true

labels:
  - pairs:
      haven.common-ground.nl/environment: dev
      haven.common-ground.nl/version: "1.0"
