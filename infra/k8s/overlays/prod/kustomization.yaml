# Haven+ Kustomize Overlay - Production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iou-prod

resources:
  - ../../base

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: iou-api
    spec:
      replicas: 4
      template:
        spec:
          containers:
            - name: iou-api
              resources:
                limits:
                  cpu: 2000m
                  memory: 2Gi
                requests:
                  cpu: 200m
                  memory: 512Mi

configMapGenerator:
  - name: iou-api-config
    literals:
      - ENVIRONMENT=production
      - DATABASE_MAX_POOL_SIZE=20
      - ENABLE_DEBUG=false

labels:
  - pairs:
      haven.common-ground.nl/environment: production
      haven.common-ground.nl/version: "1.0"
